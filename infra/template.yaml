              identity: ctx.identity,
              arguments: ctx.args,
            },
          };
        }
        export function response(ctx) {
          if (ctx.error) {
            util.error(ctx.error.message, ctx.error.type);
          }
          return ctx.result;
        }

Outputs:
  GraphQLApiUrl:
    Value: !GetAtt GraphQLApi.GraphQLUrl
  UserPoolId:
    Value: !Ref UserPool
  UserPoolClientId:
    Value: !Ref UserPoolClient
  DevTestUserPoolClientId:
    Condition: IsDev
    Description: Dev-only Cognito client (admin password flow) for CLI smoke tests.
    Value: !Ref DevTestUserPoolClient
  DbProxyEndpoint:
    Value: !GetAtt DbProxy.Endpoint
  DocumentsBucket:
    Value: !Ref DocumentsBucket
