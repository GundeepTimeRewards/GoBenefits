AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: GoBenefits V4 — Phase 0 foundation (AppSync + Lambda + Aurora MySQL + Cognito)

# ---------------------------------------------------------------------------
# NOTE: Phase 0 skeleton. Stands up the foundation only — no business modules.
# Stateful infra (Aurora cluster, RDS Proxy) is sketched; fill VPC/subnet params
# and security groups for a real deploy. Keep tenant model consistent with the
# DB design: one shared cluster, database-per-customer, control-plane shared DB.
# ---------------------------------------------------------------------------

Parameters:
  Env:
    Type: String
    AllowedValues: [dev, staging, prod]
    Default: dev
  VpcId:
    Type: AWS::EC2::VPC::Id
  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
  DbMinACU:
    Type: Number
    Default: 0.5
  DbMaxACU:
    Type: Number
    Default: 4

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 15
    MemorySize: 512
    Tracing: Active
    Architectures: [arm64]
    Environment:
      Variables:
        CONTROL_PLANE_DB: control_plane
        RDS_PROXY_ENDPOINT: !GetAtt DbProxy.Endpoint
        DB_SECRET_ARN: !Ref DbSecret
        EVENT_BUS_NAME: !Ref EventBus

Conditions:
  # Dev-only resources (e.g. the smoke-test Cognito client) exist ONLY when Env=dev,
  # so staging/prod never carry the relaxed auth surface.
  IsDev: !Equals [!Ref Env, dev]

Resources:
  # ---- Security / config ---------------------------------------------------
  EncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: GoBenefits V4 encryption key
      EnableKeyRotation: true

  DbSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "goben-${Env}-db"
      GenerateSecretString:
        SecretStringTemplate: '{"username":"goben_app"}'
        GenerateStringKey: "password"
        ExcludePunctuation: true
        PasswordLength: 32

  # ---- Data tier (shared cluster; database-per-customer) -------------------
  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: GoBenefits Aurora subnets
      SubnetIds: !Ref PrivateSubnetIds

  AuroraCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineMode: provisioned
      ServerlessV2ScalingConfiguration:
        MinCapacity: !Ref DbMinACU
        MaxCapacity: !Ref DbMaxACU
      MasterUsername: !Sub "{{resolve:secretsmanager:${DbSecret}:SecretString:username}}"
      MasterUserPassword: !Sub "{{resolve:secretsmanager:${DbSecret}:SecretString:password}}"
      StorageEncrypted: true
      KmsKeyId: !Ref EncryptionKey
      DBSubnetGroupName: !Ref DbSubnetGroup
      VpcSecurityGroupIds: [!Ref AuroraSecurityGroup]

  AuroraInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref AuroraCluster
      DBInstanceClass: db.serverless
      Engine: aurora-mysql

  DbProxy:
    Type: AWS::RDS::DBProxy
    Properties:
      DBProxyName: !Sub "goben-${Env}-proxy"
      EngineFamily: MYSQL
      RoleArn: !GetAtt DbProxyRole.Arn
      Auth:
        - AuthScheme: SECRETS
          SecretArn: !Ref DbSecret
          IAMAuth: DISABLED
      VpcSubnetIds: !Ref PrivateSubnetIds
      VpcSecurityGroupIds: [!Ref DbProxySecurityGroup]
      RequireTLS: true

  # Associates the proxy with the Aurora cluster (its default target group). Without
  # this the proxy has no backend to route to. Depends on the instance so the cluster
  # has an available writer target when the group is created.
  DbProxyTargetGroup:
    Type: AWS::RDS::DBProxyTargetGroup
    DependsOn: AuroraInstance
    Properties:
      DBProxyName: !Ref DbProxy
      TargetGroupName: default
      DBClusterIdentifiers: [!Ref AuroraCluster]

  DbProxyRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: rds.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: read-db-secret
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [secretsmanager:GetSecretValue]
                Resource: !Ref DbSecret

  # ---- Identity ------------------------------------------------------------
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "goben-${Env}"
      # OPTIONAL MFA requires at least one enabled MFA method. TOTP (authenticator app)
      # needs no SMS/SNS configuration. Without EnabledMfas, Cognito rejects the create
      # ("SMS configuration ... required when MFA is required/optional") — this exact
      # defect rolled back the first goben-dev deploy (FOUNDATION-DEPLOY-2 gap G1).
      MfaConfiguration: "OPTIONAL"
      EnabledMfas: [SOFTWARE_TOKEN_MFA]
      Policies:
        PasswordPolicy: { MinimumLength: 12, RequireNumbers: true, RequireSymbols: true, RequireUppercase: true }

  # Primary app client — SRP only (production posture; unchanged).
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows: [ALLOW_USER_SRP_AUTH, ALLOW_REFRESH_TOKEN_AUTH]

  # DEV-ONLY smoke-test client (gap G2): allows the admin password flow so CLI smoke
  # tests can mint ID tokens via `admin-initiate-auth` without an SRP helper. Exists
  # ONLY when Env=dev (IsDev); staging/prod never create it. The primary app client
  # above stays SRP-only.
  DevTestUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Condition: IsDev
    Properties:
      ClientName: !Sub "goben-${Env}-smoke-test"
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows: [ALLOW_ADMIN_USER_PASSWORD_AUTH, ALLOW_USER_SRP_AUTH, ALLOW_REFRESH_TOKEN_AUTH]

  # ---- Eventing (skeleton for later modules) -------------------------------
  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub "goben-${Env}"

  # ---- Documents -----------------------------------------------------------
  DocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "goben-${Env}-documents-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault: { SSEAlgorithm: aws:kms, KMSMasterKeyID: !Ref EncryptionKey }
      PublicAccessBlockConfiguration:
        { BlockPublicAcls: true, BlockPublicPolicy: true, IgnorePublicAcls: true, RestrictPublicBuckets: true }

  # ---- Compute -------------------------------------------------------------
  # NOTE: all three functions use `BuildMethod: makefile` (see the repo-root Makefile).
  # SAM's built-in esbuild builder runs `npm install`, which cannot resolve the local
  # @goben/* bun-workspace packages (unpublished, "*" -> npm 404). The Makefile bundles
  # each entry with esbuild instead, inlining the workspace code. CodeUri is the repo
  # root so the make target runs there and the entrypoints resolve @goben/* + mysql2
  # against the repo's node_modules; only the built .mjs artifact is packaged.
  GraphqlResolverFn:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      CodeUri: ../
      VpcConfig:
        SubnetIds: !Ref PrivateSubnetIds
        SecurityGroupIds: [!Ref LambdaSecurityGroup]
      Policies:
        - AWSSecretsManagerGetSecretValuePolicy: { SecretArn: !Ref DbSecret }
    Metadata:
      BuildMethod: makefile

  DbMigratorFn:
    Type: AWS::Serverless::Function
    Properties:
      Handler: migrate.handler
      CodeUri: ../
      Timeout: 120
      VpcConfig:
        SubnetIds: !Ref PrivateSubnetIds
        SecurityGroupIds: [!Ref LambdaSecurityGroup]
      Policies:
        - AWSSecretsManagerGetSecretValuePolicy: { SecretArn: !Ref DbSecret }
    Metadata:
      BuildMethod: makefile

  TenantProvisionerFn:
    Type: AWS::Serverless::Function
    Properties:
      Handler: provision.handler
      CodeUri: ../
      Timeout: 120
      VpcConfig:
        SubnetIds: !Ref PrivateSubnetIds
        SecurityGroupIds: [!Ref LambdaSecurityGroup]
      Policies:
        - AWSSecretsManagerGetSecretValuePolicy: { SecretArn: !Ref DbSecret }
    Metadata:
      BuildMethod: makefile

  # ---- Network security groups (reference-based; NO 0.0.0.0/0 on 3306) ------
  # Path: Lambda SG --3306--> RDS Proxy SG --3306--> Aurora SG. Each tier is reachable
  # ONLY from the tier in front of it, by security-group reference (not CIDR). Lambda
  # SG keeps CloudFormation's default allow-all egress (no SecurityGroupEgress block),
  # which is sufficient to reach the proxy (3306) and the interface endpoints (443).
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: GoBenefits Lambda egress to Aurora/RDS Proxy + VPC endpoints
      VpcId: !Ref VpcId

  DbProxySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RDS Proxy - reachable only from the Lambda SG on 3306
      VpcId: !Ref VpcId

  AuroraSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Aurora - reachable only from the RDS Proxy SG on 3306
      VpcId: !Ref VpcId

  VpcEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: VPC interface endpoints - reachable only from the Lambda SG on 443
      VpcId: !Ref VpcId

  # Ingress rules as standalone resources so the SG references don't create cycles.
  DbProxyIngressFromLambda:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref DbProxySecurityGroup
      IpProtocol: tcp
      FromPort: 3306
      ToPort: 3306
      SourceSecurityGroupId: !Ref LambdaSecurityGroup

  AuroraIngressFromProxy:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref AuroraSecurityGroup
      IpProtocol: tcp
      FromPort: 3306
      ToPort: 3306
      SourceSecurityGroupId: !Ref DbProxySecurityGroup

  VpcEndpointIngressFromLambda:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref VpcEndpointSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      SourceSecurityGroupId: !Ref LambdaSecurityGroup

  # ---- VPC interface endpoints (private-subnet egress to AWS APIs, no NAT) ---
  # In-VPC Lambdas need Secrets Manager (DB creds), KMS (decrypt the secret), Logs,
  # and X-Ray (Tracing: Active). Interface endpoints avoid an always-on NAT Gateway
  # (~4 endpoints ≈ cost of, and cheaper at low volume than, a NAT). PrivateDnsEnabled
  # so the SDK's default endpoints resolve to these. Requires VPC DNS support enabled.
  SecretsManagerEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.secretsmanager"
      VpcId: !Ref VpcId
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: !Ref PrivateSubnetIds
      SecurityGroupIds: [!Ref VpcEndpointSecurityGroup]

  KmsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.kms"
      VpcId: !Ref VpcId
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: !Ref PrivateSubnetIds
      SecurityGroupIds: [!Ref VpcEndpointSecurityGroup]

  LogsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.logs"
      VpcId: !Ref VpcId
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: !Ref PrivateSubnetIds
      SecurityGroupIds: [!Ref VpcEndpointSecurityGroup]

  XrayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.xray"
      VpcId: !Ref VpcId
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: !Ref PrivateSubnetIds
      SecurityGroupIds: [!Ref VpcEndpointSecurityGroup]

  # ---- API -----------------------------------------------------------------
  GraphQLApi:
    Type: AWS::AppSync::GraphQLApi
    Properties:
      Name: !Sub "goben-${Env}"
      AuthenticationType: AMAZON_COGNITO_USER_POOLS
      UserPoolConfig:
        UserPoolId: !Ref UserPool
        AwsRegion: !Ref AWS::Region
        DefaultAction: ALLOW
      XrayEnabled: true

  GraphQLSchema:
    Type: AWS::AppSync::GraphQLSchema
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      DefinitionS3Location: ../api/schema.graphql

  # AppSync -> Lambda data source (direct-lambda resolvers; no VTL needed — the
  # full $context is delivered to the handler, matching event.info/identity/arguments).
  AppSyncDataSourceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: appsync.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: invoke-resolver
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [lambda:InvokeFunction]
                Resource: !GetAtt GraphqlResolverFn.Arn

  ResolverDataSource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      Name: GraphqlResolver
      Type: AWS_LAMBDA
      ServiceRoleArn: !GetAtt AppSyncDataSourceRole.Arn
      LambdaConfig:
        LambdaFunctionArn: !GetAtt GraphqlResolverFn.Arn

  # --- Phase C (C1) resolvers -----------------------------------------------
  # All 14 C1 fields use ONE shared APPSYNC_JS pass-through against the single
  # Lambda data source. The request handler forwards {info, identity, arguments}
  # to the resolver Lambda (so event.identity.sub + event.arguments +
  # event.info.fieldName match the handler's AppSyncEvent). The response handler
  # maps a Lambda error into a typed GraphQL error via ctx.error.type
  # (Unauthorized / ValidationError; anything else stays a generic error). The
  # SAME `Code` string is used for every resolver — see PhaseCResolverCode note.
  #
  # NOTE: CloudFormation has no YAML-anchor support, so the identical resolver
  # `Code` is repeated per field. If this list grows, move the code to
  # `CodeS3Location` (uploaded at build) to DRY it up.

  MeResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: GraphQLSchema
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      TypeName: Query
      FieldName: me
      DataSourceName: !GetAtt ResolverDataSource.Name
      Runtime: { Name: APPSYNC_JS, RuntimeVersion: "1.0.0" }
      Code: |
        import { util } from '@aws-appsync/utils';
        export function request(ctx) {
          return {
            operation: 'Invoke',
            payload: {
              info: { fieldName: ctx.info.fieldName, parentTypeName: ctx.info.parentTypeName },
              identity: ctx.identity,
              arguments: ctx.args,
            },
          };
        }
        export function response(ctx) {
          if (ctx.error) {
            util.error(ctx.error.message, ctx.error.type);
          }
          return ctx.result;
        }

  MyEmployersResolver:
