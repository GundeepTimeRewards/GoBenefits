## =============================================================================
## Query — page read models are aggregates; low-level queries are for details.
## =============================================================================
type Query {
  ## Identity & employer selection
  me: Me!
  myEmployers: [EmployerSummary!]!
  employer(employerId: ID!): Employer
  employerOverview(employerId: ID!, planYearId: ID!): EmployerOverview
  employerProgress(planYearId: ID!): [EmployerProgress!]!   ## broker/agency cross-tenant rollup

  ## Plan years
  planYears(employerId: ID!): [PlanYear!]!
  currentPlanYear(employerId: ID!): PlanYear
  planYearActivity(employerId: ID!): [ActivityItem!]!
  planYearSetupStatus(employerId: ID!, planYearId: ID!): PlanYearSetupStatus

  ## Census & people
  employerCensusContext(employerId: ID!, planYearId: ID!): EmployerCensusContext
  employees(employerId: ID!, planYearId: ID!, search: String, limit: Int = 50, nextToken: String): CensusEmployeeConnection!
  employeeDetail(employerId: ID!, employeeId: ID!): EmployeeDetail
  dependents(employerId: ID!, employeeId: ID!): [Dependent!]!

  ## Plans & Rates
  planCatalog(employerId: ID!, planYearId: ID!): PlanCatalog
  benefitPlanDetail(employerId: ID!, planYearId: ID!, planId: ID!): BenefitPlanDetail

  ## Enrollment
  enrollmentCenter(employerId: ID!, planYearId: ID!): EnrollmentCenter
  enrollmentProgress(employerId: ID!, planYearId: ID!): EnrollmentProgress
  electionReview(employerId: ID!, planYearId: ID!): ElectionReview
  electionsForEmployee(employerId: ID!, employeeId: ID!): [Election!]!

  ## Life events
  lifeEventQueue(employerId: ID!, planYearId: ID!): LifeEventQueue
  employeeLifeEvents: EmployeeLifeEventList   ## employee self; own-records auth

  ## Documents
  documentWorkspace(employerId: ID!, planYearId: ID!): DocumentWorkspace

  ## Payroll / deductions
  deductionsWorkspace(employerId: ID!, planYearId: ID!): DeductionsWorkspace
  payrollDataWorkspace(employerId: ID!, planYearId: ID!): PayrollDataWorkspace
  payrollDeductions(employerId: ID!, planYearId: ID!): [PayrollDeduction!]! @deprecated(reason: "Transitional — use deductionsWorkspace.")

  ## Carrier & compliance
  carrierExportWorkspace(employerId: ID!, planYearId: ID!): CarrierExportWorkspace
  complianceWorkspace(employerId: ID!, planYearId: ID!): ComplianceWorkspace
}

## =============================================================================
## Mutations. The first block is the drafted core; everything under FUTURE is
## CONTRACT ONLY (signatures) — NOT implemented, and blocked until MySQL verify.
## Input shapes for FUTURE mutations are intentionally minimal; finalized per phase.
## =============================================================================
type Mutation {
  ## --- Core (drafted; still gated on MySQL verification) ---
  createEmployee(input: CreateEmployeeInput!): CensusEmployee!
  updateEmployee(input: UpdateEmployeeInput!): CensusEmployee!
  addDependent(input: CreateDependentInput!): Dependent!
  updateDependent(input: UpdateDependentInput!): Dependent!
  removeDependent(employerId: ID!, dependentId: ID!): RemoveResult!
  submitElection(input: SubmitElectionInput!): Election!
  generateQuote(input: GenerateQuoteInput!): Quote!
  generatePayrollDeductions(employerId: ID!, planYearId: ID!): JobHandle!   ## async (SQS)

  ## --- Plan years (Phase D-5) — IMPLEMENTED ---
  ## createPlanYear: empty year in `setup`; period defaults to the calendar year.
  ## copyFromPriorYear: renewal copy-forward — deep-copies the source year's plans,
  ##   options, and rates; copied plans return as drafts needing review; rate
  ##   effective dates shift by the year delta. activatePlanYear enforces a single
  ##   active year (any other active year is archived in the same transaction).
  createPlanYear(employerId: ID!, year: Int!, label: String!): PlanYear
  copyFromPriorYear(employerId: ID!, fromPlanYearId: ID!, toYear: Int!): PlanYear
  activatePlanYear(employerId: ID!, planYearId: ID!): PlanYear
  archivePlanYear(employerId: ID!, planYearId: ID!): PlanYear

  ## --- Plans & rates (Phase D-6) — IMPLEMENTED ---
  ## addPlan: new draft plan for a line in a non-archived plan year (ActionResult.id = new plan id).
  ## duplicatePlan: deep-copies a plan (options + rates) within its own plan year as a
  ##   draft named "Copy of <name>" (ActionResult.id = new plan id).
  ## importRates: REPLACES the plan's entire rate table with the given bands at one
  ##   effective date (synchronous — rate tables are small; finalized from the Phase B
  ##   JobHandle stub). Imported bands are plan-level (no plan_option link).
  ## updateContributionRule: upserts the employer-level contribution rule (finalized from
  ##   the Phase B per-plan stub — contributions are employer-level in the data model).
  addPlan(employerId: ID!, planYearId: ID!, line: CoverageLine!, planName: String!, carrierName: String): ActionResult
  duplicatePlan(employerId: ID!, planId: ID!): ActionResult
  importRates(employerId: ID!, planId: ID!, input: ImportRatesInput!): ActionResult
  updateContributionRule(employerId: ID!, input: ContributionRuleInput!): ActionResult

  ## --- Enrollment (Phase D-7) — IMPLEMENTED ---
  ## launchEnrollment: opens OE for the plan year — requires zero launch blockers and an
  ##   OPEN open-enrollment window (create one first), then invites every not-yet-invited
  ##   employee and returns the refreshed Enrollment Center aggregate.
  ## sendEnrollmentReminders: audience = all | not_started | in_progress (default all);
  ##   synchronous locally (bumps invitation reminder counts) — SQS/SES delivery in prod.
  ## createEnrollmentWindow: finalized from the (type: String!) stub — a window needs
  ##   dates. For open_enrollment the window attaches to the plan year's existing OE
  ##   event (no duplicate events); other types get a new event.
  launchEnrollment(employerId: ID!, planYearId: ID!): EnrollmentCenter
  sendEnrollmentReminders(employerId: ID!, planYearId: ID!, audience: String): JobHandle
  createEnrollmentWindow(employerId: ID!, planYearId: ID!, input: CreateEnrollmentWindowInput!): EnrollmentWindow

  ## --- Elections review (Phase E-1) — IMPLEMENTED ---
  ## The review queue is an EXCEPTION queue. approveElection blocks while an EOI/
  ## document request is open; sendBackElection returns the election to the employee
  ## (in_progress + note, open requests cleared); approveAllReadyElections bulk-
  ## approves only clean submitted rows (no open request AND computed cost).
  approveElection(employerId: ID!, planYearId: ID!, electionId: ID!): ElectionReviewRow
  sendBackElection(employerId: ID!, planYearId: ID!, electionId: ID!, note: String): ElectionReviewRow
  requestEoi(employerId: ID!, electionId: ID!): ActionResult
  requestDependentDocs(employerId: ID!, electionId: ID!): ActionResult
  approveAllReadyElections(employerId: ID!, planYearId: ID!): ActionResult

  ## --- Life events — employee self (Phase E-4) — IMPLEMENTED ---
  ## Identity-scoped: employee role only; the caller's employee row resolves via the
  ## account-email link (user_account.email = employee_contact.email), fail-closed.
  reportLifeEvent(input: ReportLifeEventInput!): EmployeeLifeEvent

  ## --- FUTURE: Life events — HR queue (Phase E) — NOT IMPLEMENTED ---
  ## (Phase E-4 — IMPLEMENTED) HR decisions record an approval trail; openElectionWindow
  ## creates a life_event enrollment event + 30-day window on the ACTIVE plan year.
  approveLifeEvent(employerId: ID!, caseId: ID!): LifeEventCase
  denyLifeEvent(employerId: ID!, caseId: ID!, reason: String): LifeEventCase
  requestLifeEventDocs(employerId: ID!, caseId: ID!): ActionResult
  openElectionWindow(employerId: ID!, caseId: ID!): ActionResult

  ## --- Documents (Phase E-3) — IMPLEMENTED, metadata-first ---
  ## uploadDocument records the index row + links (the optional planId link drives
  ## plan-doc readiness in the catalog); s3_key is reserved at insert and prod uploads
  ## bytes against it via a presigned URL — local/dev intentionally stores NO file
  ## bytes (product decision 2026-07-03). generateConfirmations creates one
  ## confirmation doc + signature request per approved-election employee, idempotently.
  uploadDocument(employerId: ID!, planYearId: ID!, category: String!, name: String!, planId: ID): Document
  requestSignature(employerId: ID!, documentId: ID!): ActionResult
  generateConfirmations(employerId: ID!, planYearId: ID!): JobHandle

  ## --- FUTURE: Deductions / payroll (Phase E) — NOT IMPLEMENTED ---
  ## (Phase E-2b — IMPLEMENTED) exportReadyDeductions batches every code-assigned,
  ## unexported rate-engine deduction; regeneration SUPERSEDES exported rows so batch
  ## lines stay resolvable; reconcileBatch: generated/sent -> approved, exactly once.
  mapDeductionCode(employerId: ID!, deductionId: ID!, code: String!): DeductionReviewRow
  exportReadyDeductions(employerId: ID!, planYearId: ID!): JobHandle
  reconcileBatch(employerId: ID!, batchId: ID!): ExportBatch
  ## (Phase E-5 — IMPLEMENTED) importPayrollData finalized from the arg-less stub: a
  ## pay period's rows come in the payload; census matching is by employee_number and
  ## unmatched rows are staged + counted, never dropped. runAcaLookback: 12-month
  ## standard measurement ending at the latest imported period; FT at avg >= 130
  ## hrs/month (§4980H); writes employee_aca; recalculateLookback re-runs the same
  ## computation. syncPayrollProvider reports not-connected locally (prod = ADP/QB).
  syncPayrollProvider(employerId: ID!): JobHandle
  importPayrollData(employerId: ID!, input: ImportPayrollInput!): JobHandle
  runAcaLookback(employerId: ID!, planYearId: ID!): JobHandle
  recalculateLookback(employerId: ID!, planYearId: ID!): JobHandle

  ## --- FUTURE: Compliance (Phase F) — NOT IMPLEMENTED ---
  ## (Phase F-2 — IMPLEMENTED per the 2026-07-03 scope decisions) generate1095c uses a
  ## documented simplified code set (offered→1E else 1H; enrolled→2C, not-full-time→2B)
  ## and NEVER overwrites migrated filed/corrected archive rows (historical 1095s are
  ## archive-retrieval only). sendToFilingPartner fails closed — e-filing not enabled.
  ## calculateAleStatus: monthly FT (130+ hrs) + FTE (capped PT hours ÷ 120) from
  ## imported payroll; ALE when the year average ≥ 50 (§4980H(c)(2)).
  generate1095c(employerId: ID!, complianceYear: Int!): JobHandle
  sendToFilingPartner(employerId: ID!, complianceYear: Int!): JobHandle
  calculateAleStatus(employerId: ID!, complianceYear: Int!): JobHandle
  ## (Phase F-1 — IMPLEMENTED; COBRA scope decision 2026-07-03: NO premium collection,
  ## a TPA administers payments — recordCobraPayment returns an honest not-enabled
  ## error and cobra_payment stays unused. createCobraEvent/recordCobraElection are
  ## additive contract finalizations: HR records qualifying events + election outcomes.)
  createCobraEvent(employerId: ID!, input: CreateCobraEventInput!): CobraEvent
  generateCobraNotice(employerId: ID!, cobraEventId: ID!): ActionResult
  recordCobraElection(employerId: ID!, cobraEventId: ID!, elected: Boolean!, coverage: String): CobraEvent
  recordCobraPayment(employerId: ID!, cobraEventId: ID!, amount: Float!): CobraPayment
}

## --- Inputs ------------------------------------------------------------------
## createEnrollmentWindow payload (Phase D-7). type: open_enrollment | new_hire |
## life_event (customer-DB enum). effectiveDate defaults to windowStart.
input CreateEnrollmentWindowInput {
  type: String!
  name: String
  windowStart: AWSDate!
  windowEnd: AWSDate!
  effectiveDate: AWSDate
}

## createCobraEvent payload (Phase F-1). eventType mirrors the cobra_event enum.
input CreateCobraEventInput {
  employeeId: ID!
  eventType: String!
  eventDate: AWSDate!
  coverage: String
}

## importPayrollData payload (Phase E-5): one pay period's rows. employeeNumber is
## the census match key; wages optional.
input PayrollRowInput {
  employeeNumber: String!
  hours: Float!
  wages: Float
}
input ImportPayrollInput {
  source: String!
  fileName: String
  periodStart: AWSDate!
  periodEnd: AWSDate!
  payDate: AWSDate
  rows: [PayrollRowInput!]!
}

## One rate band for importRates: age = null for composite (non-age-banded) rates.
## rateEe is required; missing tiers stay null (not offered).
input RateBandInput {
  age: Int
  rateEe: Float!
  rateEeSpouse: Float
  rateEeChild: Float
  rateFamily: Float
}

## importRates payload: replaces the plan's ENTIRE rate table with these bands,
## all at one effective date.
input ImportRatesInput {
  effectiveDate: AWSDate!
  rows: [RateBandInput!]!
}

## Employer-level contribution rule upsert (single-rule model, matching the
## contribution_rule table + rate engine). Omitted fields keep their current value.
input ContributionRuleInput {
  name: String
  displayName: String
  pctEmployeeHealth: Float
  pctEmployeeDental: Float
  pctEmployeeVision: Float
  pctDependentHealth: Float
  pctDependentDental: Float
  pctDependentVision: Float
  fixedBasicLife: Float
}

input CreateEmployeeInput {
  employerId: ID!
  firstName: String!
  lastName: String!
  email: AWSEmail
  phone: String
  dateOfBirth: AWSDate
  gender: String
  employmentStatus: String
  hireDate: AWSDate
  terminationDate: AWSDate
  employeeClass: String
  eligibilityClassId: ID
  payType: String
  salary: Float
  employeeNumber: String
}
input UpdateEmployeeInput {
  employerId: ID!
  employeeId: ID!
  firstName: String!
  lastName: String!
  email: AWSEmail
  phone: String
  dateOfBirth: AWSDate
  gender: String
  employmentStatus: String
  hireDate: AWSDate
  terminationDate: AWSDate
  employeeClass: String
  eligibilityClassId: ID
  payType: String
  salary: Float
  employeeNumber: String
}
input CreateDependentInput {
  employerId: ID!
  employeeId: ID!
  firstName: String!
  lastName: String!
  dateOfBirth: AWSDate
  gender: String
  relationship: Relationship!
  disabled: Boolean
  student: Boolean
}
input UpdateDependentInput {
  employerId: ID!
  dependentId: ID!
  employeeId: ID
  firstName: String!
  lastName: String!
  dateOfBirth: AWSDate
  gender: String
  relationship: Relationship!
  disabled: Boolean
  student: Boolean
}
input SubmitElectionInput {
  employerId: ID!
  employeeId: ID!
  planId: ID!
  coverageTier: CoverageTier!
  dependentIds: [ID!]
}
input GenerateQuoteInput {
  employerId: ID!
  planYearId: ID!
  planIds: [ID!]!
  contributionClassId: ID
}
## Employee self-service Report Life Event wizard.
input ReportLifeEventInput {
  eventType: String!
  eventDate: AWSDate!
  notes: String
  priorCoverageEndDate: AWSDate
  newCoverageStartDate: AWSDate
  affectedDependentIds: [ID!]
  addsNewDependent: Boolean
}

