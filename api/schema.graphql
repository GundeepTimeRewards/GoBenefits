## Book-of-business row (broker/agency) and own-employer summary.
## NOTE (Phase C / C1): per-tenant metrics are NULLABLE here on purpose. `myEmployers`
## is a control-plane-only list and MUST NOT fan out across tenant/customer DBs to
## compute counts/enrollment. These fields stay null in C1 and are populated by the
## event-fed aggregate read-model (control-plane) in a later phase.
