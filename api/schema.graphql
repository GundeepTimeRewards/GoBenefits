## GoBenefits V4 — AppSync GraphQL schema
##
## PHASE B (contract-first, SDL only): types + query/mutation SIGNATURES that mirror the
## mock-driven frontend (see docs/API_ROADMAP.md, docs/FRONTEND_API_CONTRACT_GAPS.md).
## NO resolvers are wired. Phase C+ resolver implementation is BLOCKED until the
## census/plan-year foundation passes MySQL integration tests (docs/IMPLEMENTATION_STATUS.md).
##
## Decisions (2026-07-01):
##  1. Public contract uses `employerId` (NOT `customerId`). Internal tenant routing maps
##     employerId -> customer DB; `customerId` must NOT appear on new/public fields.
##  2. Plan-year-sensitive reads take an explicit `planYearId: ID!`. `currentPlanYear`
##     resolves the UI default. No hidden plan-year defaults on read models.
##  3. Page dashboards/workspaces are server-computed AGGREGATE read models (one query per
##     page); low-level queries are for detail screens only.
##  4. Subscriptions are DEFERRED for MVP (see the commented block at the end). Use
##     query + refetch for now.
##
## Tenancy: the employer (customer DB) is resolved server-side from Cognito identity ->
## tenant registry, then permission x scope (decideEmployerAccess) BEFORE any DB access.
## `employerId` from a client is a claim, authorized server-side — never trusted raw.

schema {
  query: Query
  mutation: Mutation
}

scalar AWSDate
scalar AWSDateTime
scalar AWSEmail

## --- Enums -------------------------------------------------------------------
enum Role { super_admin support agency_admin broker employer_admin employee }
enum EmployerStatus { prospect setup active archived }
enum PlanYearStatus { setup open_enrollment active archived }
enum CoverageLine { medical dental vision rx basic_life vol_life std ltd accident critical_illness hospital }
enum CoverageTier { ee ee_spouse ee_child family waived }
enum ElectionStatus { not_started in_progress submitted approved waived terminated }
enum EmploymentStatus { active terminated cobra retired leave }
enum Relationship { spouse child domestic_partner other }
enum PayFrequency { F12 F24 F26 F52 }   ## monthly / semi-monthly / bi-weekly / weekly
enum Severity { high medium low }
enum LaunchState { not_launched launched closed archived }
enum ConfigStatus { complete partial missing }
enum ChecklistStatus { complete in_progress needs_attention not_started blocked not_applicable }

## Generic result shapes for async / stubbed actions. ActionResult.id carries the
## created/affected entity id when the action has one (e.g. addPlan → new plan id).
type JobHandle { jobId: ID!  status: String! }
type ActionResult { ok: Boolean!  message: String  id: ID }
type RemoveResult { removed: Boolean! }

## --- Identity & org (control-plane) -----------------------------------------
